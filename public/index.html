<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ADORE India – Motivating Youth for Positive Action</title>
    <meta name="description" content="ADORE India portal – podcasts, programs, workshops, webinars, and youth empowerment resources." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 99999;
        background: #1e3a8a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 28px;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; }
      #splash img { width: 140px; height: 140px; object-fit: contain; border-radius: 16px; animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
      #splash-bar { width: 180px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden; }
      #splash-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #f97316, #fbbf24); border-radius: 4px; animation: splashFill 1.6s ease forwards; }
      #splash-text { color: rgba(255,255,255,0.7); font-family: sans-serif; font-size: 13px; letter-spacing: 1px; animation: splashFadeIn 0.8s 0.3s both; }
      @keyframes splashPop { from { opacity:0; transform: scale(0.6); } to { opacity:1; transform: scale(1); } }
      @keyframes splashFill { 0%{width:0%} 60%{width:75%} 100%{width:100%} }
      @keyframes splashFadeIn { from{opacity:0} to{opacity:1} }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash Screen -->
    <div id="splash">
      <img src="/favicon.png" alt="ADORE India" />
      <div id="splash-bar"><div id="splash-fill"></div></div>
      <div id="splash-text">MOTIVATING YOUTH FOR POSITIVE ACTION</div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 600);
          }
        }, 1800);
      });
    </script>
  </body>
</html>
